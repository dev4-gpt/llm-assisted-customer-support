name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/ evaluation/

      - name: Ruff format check
        run: ruff format --check app/ tests/ evaluation/

      - name: Mypy type check
        run: mypy app/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Offline evaluation (mock LLM)
        env:
          APP_SECRET_KEY: test-secret-key-minimum-16chars
          QUALITY_POLICY_CONTEXT_TOP_K: "0"
          TRIAGE_POLICY_CONTEXT_TOP_K: "0"
        run: python scripts/run_offline_eval.py --data data/golden/eval_set.jsonl

      - name: Run tests with coverage
        env:
          LLM_PROFILE: manual
          LLM_PROVIDER: openai_compatible
          OPENAI_COMPATIBLE_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_COMPATIBLE_API_KEY: test-api-key
          LLM_MODEL: google/gemini-2.0-flash-exp:free
          APP_SECRET_KEY: test-secret-key-minimum-16chars
          REDIS_URL: redis://localhost:6379/0
          QUALITY_POLICY_CONTEXT_TOP_K: "0"
          TRIAGE_POLICY_CONTEXT_TOP_K: "0"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target runtime -t support-triage:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d \
            -p 8000:8000 \
            -e LLM_PROFILE=manual \
            -e LLM_PROVIDER=openai_compatible \
            -e OPENAI_COMPATIBLE_BASE_URL=https://openrouter.ai/api/v1 \
            -e OPENAI_COMPATIBLE_API_KEY=test-api-key \
            -e LLM_MODEL=google/gemini-2.0-flash-exp:free \
            -e APP_SECRET_KEY=test-secret-key-minimum-16chars \
            --name smoke-test \
            support-triage:${{ github.sha }}
          sleep 5
          docker logs smoke-test
          docker stop smoke-test
